version: "3.9"

services:
  api:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install -e .[dev] && uvicorn copytrading_app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    volumes:
      - ./:/app
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
