name: Bug report
description: Report a reproducible problem
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping improve TradeNodeX. Do not include secrets, API keys, private logs, account identifiers, or screenshots containing sensitive data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the problem clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the smallest reproducible sequence.
      placeholder: |
        1. Start ...
        2. Configure ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: main branch, release tag, or commit SHA
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Backend API
        - Frontend UI
        - Worker runtime
        - Exchange adapter
        - Documentation
        - Deployment
        - Other
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Python version, Node version, database, deployment mode
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Remove secrets, account identifiers, API keys, and private data before posting.
      render: text