name: Feature request
description: Suggest a focused improvement
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please keep requests focused and practical. Avoid including private data or sensitive operational details.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should this feature solve?
      placeholder: Describe the operator or developer pain point.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Documentation
        - Backend API
        - Frontend UI
        - Worker runtime
        - Exchange adapter
        - Deployment
        - Security
        - Observability
        - Other
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add diagrams, sanitized examples, or links if helpful.